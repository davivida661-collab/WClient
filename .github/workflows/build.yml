name: Compilar WClient APK

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:  # Permite compilar manualmente pelo GitHub

jobs:
  build:
    name: Compilar APK ⚡
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Configurar Java 8 (para relay)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: 🏗️ Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: 🚀 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Compilar APK Debug
        run: |
          ./gradlew :app:assembleDebug --parallel --configure-on-demand \
            -Dorg.gradle.caching=true \
            -Dorg.gradle.parallel=true \
            --max-workers=4 \
            --build-cache

      - name: 📦 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          compression-level: 0
          if-no-files-found: error

      - name: 📋 Listar APKs gerados
        run: |
          echo "✅ APKs compilados com sucesso!"
          find app/build/outputs -name "*.apk" -exec ls -lh {} \;
